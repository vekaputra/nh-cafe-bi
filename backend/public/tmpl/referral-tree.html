<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHKorindo Cafe - Referral Tree</title>
    <link rel="stylesheet" href="{{.BaseURL}}/view/mvp.css">
    <link rel="stylesheet" href="{{.BaseURL}}/view/style.css">
    <style>
        .tree-explorer {
            list-style: none;
            padding-left: 0;
            margin-top: 20px;
        }
        .tree-explorer ul {
            list-style: none;
            padding-left: 20px;
            border-left: 1px dashed #ccc;
            margin-left: 10px;
        }
        .tree-explorer li {
            margin: 5px 0;
            position: relative;
        }
        .node-content {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .node-content:hover {
            background-color: #f0f0f0;
        }
        .toggle-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            margin-right: 5px;
            font-family: monospace;
            font-weight: bold;
            color: #666;
        }
        .node-details {
            margin-left: 5px;
        }
        .node-code {
            font-weight: bold;
            color: #2c3e50;
        }
        .node-fee {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-left: 10px;
        }
        .collapsed ul {
            display: none;
        }
        .leaf .toggle-icon {
            visibility: hidden;
        }
        .filter-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select {
            padding: 8px;
            min-width: 300px;
        }
    </style>
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="{{.BaseURL}}/page/upload-csv">Upload CSV</a></li>
            <li><a href="{{.BaseURL}}/page/upload-approval">Approve Uploads</a></li>
            <li><a href="{{.BaseURL}}/page/assign-referral">Assign Referral</a></li>
            <li><a href="{{.BaseURL}}/page/add-payment">Add Payment</a></li>
            <li><a href="{{.BaseURL}}/page/multi-transaction">Multi Transaction</a></li>
            <li><a href="{{.BaseURL}}/page/referral-tree">Referral Tree</a></li>
        </ul>
    </nav>
</header>
<main>
    <section>
        <h3>Referral Tree Explorer</h3>
        
        <div class="filter-section">
            <label for="referral-select">Select Referral (T_ codes only):</label>
            <select id="referral-select">
                <option value="">-- Select a Referral --</option>
            </select>
            <button onclick="applyFilter()">Show Tree</button>
            <button class="bg-red" onclick="resetFilter()">Reset</button>
        </div>

        <div id="tree-display">
            <p>Please select a referral to view its hierarchy.</p>
        </div>
    </section>
</main>

<script>
    const baseURL = "{{.BaseURL}}";
    let allReferrals = [];

    async function init() {
        try {
            // Fetch initial data to populate the dropdown
            const response = await fetch(`${baseURL}/v1/referral-tree`);
            const data = await response.json();
            
            // Flatten the tree to get all available referrals for the dropdown
            allReferrals = flattenTree(data);
            populateDropdown(allReferrals);
        } catch (error) {
            console.error("Error initializing:", error);
        }
    }

    function flattenTree(nodes) {
        let result = [];
        nodes.forEach(node => {
            result.push({
                id: node.id,
                label: `${node.display_code || node.code} (${node.sharing_fee}%)`
            });
            if (node.children && node.children.length > 0) {
                result = result.concat(flattenTree(node.children));
            }
        });
        // Sort alphabetically
        return result.sort((a, b) => a.label.localeCompare(b.label));
    }

    function populateDropdown(referrals) {
        const select = document.getElementById('referral-select');
        referrals.forEach(ref => {
            const option = document.createElement('option');
            option.value = ref.id;
            option.textContent = ref.label;
            select.appendChild(option);
        });
    }

    async function applyFilter() {
        const referralId = document.getElementById('referral-select').value;
        if (!referralId) return;

        const display = document.getElementById('tree-display');
        display.innerHTML = '<p>Loading tree...</p>';

        try {
            const response = await fetch(`${baseURL}/v1/referral-tree?referral_id=${referralId}`);
            const data = await response.json();
            renderTree(data);
        } catch (error) {
            display.innerText = "Error loading tree: " + error;
        }
    }

    function resetFilter() {
        document.getElementById('referral-select').value = "";
        const display = document.getElementById('tree-display');
        display.innerHTML = '<p>Please select a referral to view its hierarchy.</p>';
    }

    function renderTree(roots) {
        const container = document.getElementById('tree-display');
        container.innerHTML = '';
        if (!roots || roots.length === 0) {
            container.innerText = "No matching referral tree found.";
            return;
        }

        const ul = document.createElement('ul');
        ul.className = 'tree-explorer';
        roots.forEach(root => {
            ul.appendChild(createNodeElement(root));
        });
        container.appendChild(ul);
    }

    function createNodeElement(node) {
        const li = document.createElement('li');
        const hasChildren = node.children && node.children.length > 0;
        
        if (!hasChildren) {
            li.className = 'leaf';
        }

        const contentDiv = document.createElement('div');
        contentDiv.className = 'node-content';
        
        const toggleIcon = document.createElement('span');
        toggleIcon.className = 'toggle-icon';
        toggleIcon.textContent = '▼';
        contentDiv.appendChild(toggleIcon);

        const detailsSpan = document.createElement('span');
        detailsSpan.className = 'node-details';
        detailsSpan.innerHTML = `<span class="node-code">${node.display_code || node.code}</span><span class="node-fee">Fee: ${node.sharing_fee}%</span>`;
        contentDiv.appendChild(detailsSpan);

        li.appendChild(contentDiv);

        if (hasChildren) {
            const childrenUl = document.createElement('ul');
            node.children.forEach(child => {
                childrenUl.appendChild(createNodeElement(child));
            });
            li.appendChild(childrenUl);

            contentDiv.onclick = (e) => {
                e.stopPropagation();
                li.classList.toggle('collapsed');
                toggleIcon.textContent = li.classList.contains('collapsed') ? '▶' : '▼';
            };
        }

        return li;
    }

    init();
</script>
</body>
</html>
