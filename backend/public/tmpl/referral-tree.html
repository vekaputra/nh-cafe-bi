<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHKorindo Cafe - Referral Tree</title>
    <link rel="stylesheet" href="{{.BaseURL}}/view/mvp.css">
    <link rel="stylesheet" href="{{.BaseURL}}/view/style.css">
    <style>
        label {
            width: 120px;
        }

        select {
            width: 340px;
        }

        form {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="{{.BaseURL}}/page/upload-csv">Upload CSV</a></li>
            <li><a href="{{.BaseURL}}/page/upload-approval">Approve Uploads</a></li>
            <li><a href="{{.BaseURL}}/page/assign-referral">Assign Referral</a></li>
            <li><a href="{{.BaseURL}}/page/add-payment">Add Payment</a></li>
            <li><a href="{{.BaseURL}}/page/multi-transaction">Multi Transaction</a></li>
            <li><a href="{{.BaseURL}}/page/referral-tree">Referral Tree</a></li>
        </ul>
    </nav>
</header>
<main>
    <section>
        <form id="form">
            <div>
                <label for="referral-select">Referral:</label>
                <select id="referral-select" name="referral_id">
                    <option value="">-- Choose Referral --</option>
                </select>
            </div>
            <div class="text-center">
                <button type="button" onclick="applyFilter()">Show Tree</button>
                <button type="button" class="bg-red" onclick="resetFilter()">Reset</button>
            </div>
        </form>
    </section>

    <section>
        <div id="tree-display">
            <p>Please select a referral to view its hierarchy.</p>
        </div>
    </section>
</main>

<script>
    async function init() {
        try {
            // Fetch referrals for the dropdown
            const response = await fetch("/v1/referrals");
            const data = await response.json();
            populateDropdown(data);
        } catch (error) {
            console.error("Error initializing:", error);
        }
    }

    function populateDropdown(referrals) {
        const select = document.getElementById('referral-select');
        referrals.forEach(ref => {
            const option = document.createElement('option');
            option.value = ref.id;
            option.textContent = ref.name;
            select.appendChild(option);
        });
    }

    async function applyFilter() {
        const referralId = document.getElementById('referral-select').value;
        if (!referralId) return;

        const display = document.getElementById('tree-display');
        display.innerHTML = '<p>Loading tree...</p>';

        try {
            const response = await fetch(`/v1/referral-tree?referral_id=${referralId}`);
            const data = await response.json();
            renderTree(data);
        } catch (error) {
            display.innerText = "Error loading tree: " + error;
        }
    }

    function resetFilter() {
        document.getElementById('referral-select').value = "";
        const display = document.getElementById('tree-display');
        display.innerHTML = '<p>Please select a referral to view its hierarchy.</p>';
    }

    function renderTree(roots) {
        const container = document.getElementById('tree-display');
        container.innerHTML = '';
        if (!roots || roots.length === 0) {
            container.innerText = "No matching referral tree found.";
            return;
        }

        const ul = document.createElement('ul');
        roots.forEach(root => {
            ul.appendChild(createNodeElement(root));
        });
        container.appendChild(ul);
    }

    function createNodeElement(node) {
        const li = document.createElement('li');
        
        // Format: {branch_name} - {display_code} - {sharing_fee} - {assigned_at}
        const displayText = `${node.branch_name} - ${node.display_code || node.code} - ${node.sharing_fee}% - ${node.assigned_at}`;
        li.textContent = displayText;

        if (node.children && node.children.length > 0) {
            const childrenUl = document.createElement('ul');
            node.children.forEach(child => {
                childrenUl.appendChild(createNodeElement(child));
            });
            li.appendChild(childrenUl);
        }

        return li;
    }

    init();
</script>
</body>
</html>
