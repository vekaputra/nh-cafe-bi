<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NHKorindo Cafe - Referral Tree</title>
    <link rel="stylesheet" href="{{.BaseURL}}/view/mvp.css">
    <link rel="stylesheet" href="{{.BaseURL}}/view/style.css">
    <style>
        .tree-container {
            margin: 20px;
            font-family: sans-serif;
        }
        .tree ul {
            padding-top: 20px; position: relative;
            transition: all 0.5s;
            -webkit-transition: all 0.5s;
            -moz-transition: all 0.5s;
            display: flex;
        }
        .tree li {
            float: left; text-align: center;
            list-style-type: none;
            position: relative;
            padding: 20px 5px 0 5px;
            transition: all 0.5s;
            -webkit-transition: all 0.5s;
            -moz-transition: all 0.5s;
        }
        .tree li::before, .tree li::after {
            content: '';
            position: absolute; top: 0; right: 50%;
            border-top: 1px solid #ccc;
            width: 50%; height: 20px;
        }
        .tree li::after {
            right: auto; left: 50%;
            border-left: 1px solid #ccc;
        }
        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after {
            border: 0 none;
        }
        .tree li:last-child::before {
            border-right: 1px solid #ccc;
            border-radius: 0 5px 0 0;
            -webkit-border-radius: 0 5px 0 0;
            -moz-border-radius: 0 5px 0 0;
        }
        .tree li:first-child::after {
            border-radius: 5px 0 0 0;
            -webkit-border-radius: 5px 0 0 0;
            -moz-border-radius: 5px 0 0 0;
        }
        .tree ul ul::before {
            content: '';
            position: absolute; top: 0; left: 50%;
            border-left: 1px solid #ccc;
            width: 0; height: 20px;
        }
        .tree li div {
            border: 1px solid #ccc;
            padding: 5px 10px;
            text-decoration: none;
            color: #666;
            font-family: arial, verdana, tahoma;
            font-size: 11px;
            display: inline-block;
            border-radius: 5px;
            -webkit-border-radius: 5px;
            -moz-border-radius: 5px;
            transition: all 0.5s;
            -webkit-transition: all 0.5s;
            -moz-transition: all 0.5s;
            background: white;
        }
        .tree li div:hover, .tree li div:hover+ul li div {
            background: #c8e4f8; color: #000; border: 1px solid #94a0b4;
        }
        .tree li div:hover+ul li::after, 
        .tree li div:hover+ul li::before, 
        .tree li div:hover+ul::before, 
        .tree li div:hover+ul ul::before {
            border-color:  #94a0b4;
        }

        /* Vertical Tree Style Alternative if horizontal is too wide */
        .vertical-tree ul {
            padding-left: 20px;
            list-style: none;
        }
        .vertical-tree li {
            position: relative;
            padding: 5px 0;
        }
        .vertical-tree li::before {
            content: "";
            position: absolute;
            top: 0;
            left: -10px;
            border-left: 1px solid #ccc;
            height: 100%;
        }
        .vertical-tree li::after {
            content: "";
            position: absolute;
            top: 15px;
            left: -10px;
            border-top: 1px solid #ccc;
            width: 10px;
        }
        .vertical-tree li:last-child::before {
            height: 15px;
        }
        .node-info {
            text-align: left;
        }
        .node-code { font-weight: bold; }
        .node-fee { color: #2c3e50; }
    </style>
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a href="{{.BaseURL}}/page/upload-csv">Upload CSV</a></li>
            <li><a href="{{.BaseURL}}/page/upload-approval">Approve Uploads</a></li>
            <li><a href="{{.BaseURL}}/page/assign-referral">Assign Referral</a></li>
            <li><a href="{{.BaseURL}}/page/add-payment">Add Payment</a></li>
            <li><a href="{{.BaseURL}}/page/multi-transaction">Multi Transaction</a></li>
            <li><a href="{{.BaseURL}}/page/referral-tree">Referral Tree</a></li>
        </ul>
    </nav>
</header>
<main>
    <section>
        <h3>Referral Tree</h3>
        <div id="tree-display" class="vertical-tree">
            <!-- Tree will be rendered here -->
            Loading...
        </div>
    </section>
</main>

<script>
    async function fetchTree() {
        try {
            const response = await fetch("{{.BaseURL}}/v1/referral-tree");
            const data = await response.json();
            renderTree(data);
        } catch (error) {
            document.getElementById('tree-display').innerText = "Error loading tree: " + error;
        }
    }

    function renderTree(roots) {
        const container = document.getElementById('tree-display');
        container.innerHTML = '';
        if (!roots || roots.length === 0) {
            container.innerText = "No referral fees found.";
            return;
        }

        const ul = document.createElement('ul');
        roots.forEach(root => {
            ul.appendChild(createNodeElement(root));
        });
        container.appendChild(ul);
    }

    function createNodeElement(node) {
        const li = document.createElement('li');
        const div = document.createElement('div');
        div.className = 'node-info';
        
        let content = `<span class="node-code">${node.display_code || node.code}</span>`;
        if (node.sharing_fee) {
            content += `<br><span class="node-fee">Fee: ${node.sharing_fee}%</span>`;
        }
        div.innerHTML = content;
        li.appendChild(div);

        if (node.children && node.children.length > 0) {
            const ul = document.createElement('ul');
            node.children.forEach(child => {
                ul.appendChild(createNodeElement(child));
            });
            li.appendChild(ul);
        }
        return li;
    }

    fetchTree();
</script>
</body>
</html>
